<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Burn-Ex AI | Live Workout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .skeleton-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
        .meter-gradient {
            background: linear-gradient(90deg, #ff571a 0%, #ffe16c 50%, #00dce5 100%);
        }
        .bloom-effect {
            box-shadow: 0 0 15px rgba(0, 220, 229, 0.4);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-error": "#690005",
                      "error": "#ffb4ab",
                      "surface-container-lowest": "#0e0e0f",
                      "tertiary": "#fff9f0",
                      "surface-container": "#f4f4f7",
                      "on-surface": "#1c1b1c",
                      "surface-dim": "#e5e2e3",
                      "surface-container-high": "#ebe9eb",
                      "secondary": "#ff571a",
                      "primary-fixed": "#006c71",
                      "tertiary-fixed-dim": "#e7c427",
                      "on-secondary-fixed": "#3a0b00",
                      "secondary-container": "#ffdbd0",
                      "inverse-surface": "#313031",
                      "on-secondary": "#ffffff",
                      "inverse-on-surface": "#f4f4f7",
                      "on-background": "#1c1b1c",
                      "secondary-fixed-dim": "#ffb59e",
                      "on-secondary-container": "#521300",
                      "on-tertiary-fixed": "#221b00",
                      "primary": "#006c71",
                      "surface-container-highest": "#e2e1e2",
                      "inverse-primary": "#63f7ff",
                      "on-primary-fixed": "#002021",
                      "on-primary-container": "#e9feff",
                      "surface": "#ffffff",
                      "on-tertiary-container": "#736000",
                      "secondary-fixed": "#ffdbd0",
                      "primary-container": "#00f5ff",
                      "surface-tint": "#00dce5",
                      "surface-container-low": "#f4f4f7",
                      "on-secondary-fixed-variant": "#852400",
                      "tertiary-fixed": "#ffe16c",
                      "primary-fixed-dim": "#00dce5",
                      "on-primary-fixed-variant": "#004f53",
                      "surface-bright": "#ffffff",
                      "outline": "#707879",
                      "on-error-container": "#ffdad6",
                      "on-primary": "#ffffff",
                      "tertiary-container": "#ffdb3f",
                      "on-tertiary-fixed-variant": "#544600",
                      "error-container": "#93000a",
                      "background": "#f4f4f7",
                      "on-tertiary": "#3a3000",
                      "outline-variant": "#bfc8c8",
                      "on-surface-variant": "#3f4849",
                      "surface-variant": "#dae4e4"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xl": "48px",
                      "container-margin": "20px",
                      "md": "16px",
                      "base": "8px",
                      "sm": "8px",
                      "xs": "4px",
                      "gutter": "16px",
                      "lg": "24px"
              },
              "fontFamily": {
                      "body-lg": ["Inter"],
                      "headline-lg-mobile": ["Montserrat"],
                      "body-md": ["Inter"],
                      "hero-metric": ["Montserrat"],
                      "headline-lg": ["Montserrat"],
                      "headline-md": ["Montserrat"],
                      "label-caps": ["Inter"]
              },
              "fontSize": {
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "hero-metric": ["64px", {"lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-surface font-body-md text-on-surface overflow-hidden h-screen w-screen">
<!-- Full Screen Camera View -->
<div class="fixed inset-0 z-0 bg-surface-container-highest overflow-hidden">
<div class="w-full h-full bg-cover bg-center opacity-90" data-alt="A cinematic, high-definition shot of a clean, bright home gym space with sunlight streaming through large windows. In the center, a person is performing a perfect squat, captured from a professional perspective. The lighting is high-key and airy, creating a crisp light-mode aesthetic. Subtle teal digital overlays of a skeletal tracking system are visible on the person's limbs, demonstrating advanced AI biomechanical analysis in a premium, modern setting." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCqEd9fIs6z5DXW5ewUhrru84M5ZI5vaAiL8e4a6LhydhNbV-1XYZvrmGFp4YPdWVDYOiuljDUeHzjar7e5zfJZf091WMB3lxcm37MQZpXh2csN4OFWmFqBwNPNj5Ib5GUi4OatrBnotHn5AvXofPlo0IbOfnaxfZvkrJBAYUirZcX-VQJnDiIiJvFtauno-MgIOBiUxYvimmBHx88sIrSGRfEXNMu8pIqp2X1ygSizoJtsLqRRPj6Qzw')"></div>
<!-- Pose Tracking Overlay (SVG Placeholder) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="skeleton-pulse" d="M50 20 L50 45 L40 60 L45 80 M50 45 L60 60 L55 80 M40 30 L60 30" fill="none" stroke="#00dce5" stroke-linecap="round" stroke-width="0.5"></path>
<circle class="skeleton-pulse" cx="50" cy="18" fill="#00dce5" r="1.5"></circle>
<circle class="skeleton-pulse" cx="40" cy="30" fill="#00dce5" r="1"></circle>
<circle class="skeleton-pulse" cx="60" cy="30" fill="#00dce5" r="1"></circle>
<circle class="skeleton-pulse" cx="40" cy="60" fill="#00dce5" r="1"></circle>
<circle class="skeleton-pulse" cx="60" cy="60" fill="#00dce5" r="1"></circle>
</svg>
</div>
<!-- Top App Bar (Shared Component Context) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-container-margin py-md bg-surface/40 backdrop-blur-md border-b border-white/20">
<div class="flex items-center gap-md">
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-headline-md">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold tracking-tighter text-primary">Burn-Ex AI</h1>
</div>
<div class="glass-panel px-4 py-1.5 rounded-full flex items-center gap-sm shadow-sm">
<span class="material-symbols-outlined text-secondary text-headline-md" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-headline-md text-headline-md tabular-nums text-on-surface">12:45</span>
</div>
</header>
<!-- Main Live UI Overlay -->
<main class="relative z-10 h-full flex flex-col justify-between p-container-margin pt-24 pb-12 pointer-events-none">
<!-- Top Metrics Row -->
<div class="flex justify-between items-start pointer-events-auto">
<!-- Rep Counter Hero -->
<div class="glass-panel p-lg rounded-3xl flex flex-col items-center min-w-[140px] bloom-effect border-primary/20">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">REPS</span>
<span class="font-hero-metric text-hero-metric text-primary">14</span>
<span class="font-body-md text-body-md text-primary/60">of 20</span>
</div>
<!-- Calorie & AI Confidence -->
<div class="flex flex-col gap-md items-end">
<div class="glass-panel p-md rounded-2xl flex flex-col items-end shadow-sm">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">BURNED</span>
<div class="flex items-baseline gap-xs">
<span class="font-headline-lg text-headline-lg text-secondary">342 - 355</span>
<span class="font-body-md text-body-md text-on-surface-variant">kcal</span>
</div>
<!-- Confidence Label -->
<div class="mt-xs bg-primary-container/30 text-on-primary-container px-2 py-0.5 rounded-full flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-[10px] font-bold uppercase tracking-wider">High Confidence</span>
</div>
</div>
</div>
</div>
<!-- Center AI Guidance Toast (Transient) -->
<div class="flex justify-center">
<div class="glass-panel px-lg py-md rounded-full flex items-center gap-md shadow-xl border-primary/30 animate-bounce">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-surface text-body-lg">psychology</span>
</div>
<p class="font-headline-md text-headline-md text-on-surface">"Keep your chest up, looking good!"</p>
</div>
</div>
<!-- Bottom Controls & Quality Meter -->
<div class="space-y-lg pointer-events-auto">
<!-- Form Quality Meter -->
<div class="glass-panel p-lg rounded-3xl space-y-md">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">FORM QUALITY</span>
<span class="font-headline-lg text-headline-lg text-primary">EXCELLENT</span>
</div>
<span class="font-headline-md text-headline-md text-primary">98%</span>
</div>
<div class="h-4 w-full bg-surface-container rounded-full overflow-hidden p-0.5">
<div class="h-full rounded-full meter-gradient transition-all duration-500" style="width: 98%"></div>
</div>
<div class="flex justify-between text-[10px] font-bold text-on-surface-variant/50 uppercase tracking-tighter">
<span>Power</span>
<span>Control</span>
<span>Range</span>
<span>Balance</span>
</div>
</div>
<!-- Interaction Bar -->
<div class="flex items-center gap-md">
<button class="h-16 w-16 glass-panel rounded-full flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-error text-headline-lg" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="h-16 flex-1 bg-primary text-surface font-headline-md text-headline-md rounded-2xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-md">
                    FINISH SET
                    <span class="material-symbols-outlined">chevron_right</span>
</button>
<button class="h-16 w-16 glass-panel rounded-full flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary text-headline-lg">volume_up</span>
</button>
</div>
</div>
</main>
<!-- Side Feedback Panel (Bento style hint) -->
<aside class="fixed right-container-margin top-1/2 -translate-y-1/2 flex flex-col gap-md z-20">
<div class="glass-panel p-md rounded-2xl flex flex-col items-center gap-xs">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-label-caps text-[10px] text-on-surface-variant">PWR</span>
</div>
<div class="glass-panel p-md rounded-2xl flex flex-col items-center gap-xs">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-label-caps text-[10px] text-on-surface-variant">BPM</span>
</div>
<div class="glass-panel p-md rounded-2xl flex flex-col items-center gap-xs">
<span class="material-symbols-outlined text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-label-caps text-[10px] text-on-surface-variant">RNK</span>
</div>
</aside>
<script>
        // Micro-interaction for the quality meter
        const meter = document.querySelector('.meter-gradient');
        setInterval(() => {
            const fluctuation = 95 + Math.random() * 5;
            meter.style.width = fluctuation + '%';
        }, 2000);

        // Interaction scale logic for all buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
</body></html>
