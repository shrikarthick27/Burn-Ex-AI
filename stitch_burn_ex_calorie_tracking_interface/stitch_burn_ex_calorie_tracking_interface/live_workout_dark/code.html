<style>
        @keyframes pulse-teal {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        .skeleton-dot {
            animation: pulse-teal 2s infinite ease-in-out;
        }
        .glass-panel {
            background: rgba(19, 19, 20, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bloom-effect {
            filter: drop-shadow(0 0 8px rgba(99, 247, 255, 0.6));
        }
        .camera-vignette {
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
        }
    </style>

<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen">
<!-- Full Screen Camera Container -->
<div class="fixed inset-0 z-0">

<div class="absolute inset-0 camera-vignette"></div>
</div>
<!-- AI Pose Tracking Overlay (SVG) -->

<!-- Connecting Lines -->
<line opacity="0.6" stroke="#63f7ff" stroke-width="2" x1="200" x2="160" y1="180" y2="250"></line>
<line opacity="0.6" stroke="#63f7ff" stroke-width="2" x1="200" x2="240" y1="180" y2="250"></line>

<line opacity="0.6" stroke="#63f7ff" stroke-width="2" x1="220" x2="240" y1="450" y2="600"></line>
<!-- Joint Points -->

<!-- Top Navigation (Contextual Suppression Active) -->

</button>

</div>

<!-- Script for simple timer mock -->
<script>
        let seconds = 522; // 08:42
        const timerEl = document.getElementById('session-timer');
        
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);

        // Random jitter for form quality to simulate real-time analysis
        const qualityBar = document.querySelector('.h-full.bg-primary-fixed');
        const qualityText = document.querySelector('.text-primary-fixed.font-label-caps:last-child');
        
        setInterval(() => {
            const jitter = Math.floor(Math.random() * 5) - 2;
            let current = parseInt(qualityText.textContent);
            let next = Math.min(100, Math.max(70, current + jitter));
            qualityBar.style.width = next + '%';
            qualityText.textContent = next + '%';
        }, 3000);
    </script>
